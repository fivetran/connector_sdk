name: README Updates

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-readme-update:
    runs-on: ubuntu-latest
    name: Check README Updates for New Directories
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch all history for proper diff

      - name: Expose PR SHAs
        run: |
          echo "BASE_SHA=${{ github.event.pull_request.base.sha }}" >> $GITHUB_ENV
          echo "HEAD_SHA=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV
          echo "HEAD_REPO=${{ github.event.pull_request.head.repo.clone_url }}" >> $GITHUB_ENV

      - name: Ensure SHAs are fetched
        run: |
          git fetch --no-tags --prune origin $BASE_SHA 
          git fetch --no-tags --prune $HEAD_REPO $HEAD_SHA

      - name: Create check script
        id: create-script
        run: |
          cat > check-readme-update.js << 'EOF'
          const path = require('path');
          const { execSync } = require('child_process');

          const ROOT_README = 'README.md';
          const EXAMPLES_README = 'examples/README.md';
          const EXAMPLES_ROOT = 'examples';
          const IGNORED_ROOT_README_DIRECTORIES = [
            'ai_and_connector_sdk',
            'git_hooks',
            '.github',
            '.github/workflows',
            '.circleci',
            '.devops',
            'ci',
            '.ci',
            'scripts',
            EXAMPLES_ROOT
          ];

          // Get the list of files changed in the PR
          function getChangedFiles() {
            try {
              // Get the base branch (target) of the PR
              const baseSha = process.env.BASE_SHA;
              // Get current branch (source) of the PR
              const headSha = process.env.HEAD_SHA;
              
              // Use Git directly to get all changed files between branches
              const gitDiff = execSync(`git diff --name-status ${baseSha}...${headSha}`, 
                                      { encoding: 'utf-8' });
              
              // Parse the git diff output
              return gitDiff.trim().split('\n').filter(line => line).map(line => {
                const [status, filename] = line.split('\t');
                return { status, filename };
              });
            } catch (error) {
              console.error('Error getting changed files:', error);
              process.exit(1);
            }
          }
          
          // Check if a directory exists before our PR
          function directoryExistsInBase(dirPath) {
            try {
              const baseSha = process.env.BASE_SHA;
              // Check if this directory exists in the base branch
              const result = execSync(
                `git ls-tree -d ${baseSha} ${dirPath}`,
                { encoding: 'utf-8', stdio: ['pipe', 'pipe', 'ignore'] }
              );
              return result.trim() !== '';
            } catch (error) {
              // If we get an error, the directory doesn't exist in base
              return false;
            }
          }

          function isUnderExamplesDirectory(dirPath) {
            return dirPath === EXAMPLES_ROOT || dirPath.startsWith(EXAMPLES_ROOT + '/');
          }

          function isIgnoredRootReadmeDirectory(dirPath) {
            return IGNORED_ROOT_README_DIRECTORIES.some(
              ignored => dirPath === ignored || dirPath.startsWith(ignored + '/')
            );
          }

          // Main function to check if new directories were added without the relevant README update
          function checkReadmeUpdate() {
            // Get all files changed in this PR
            const changedFiles = getChangedFiles();
            
            // Track added example directories
            const addedExampleDirs = new Set();
            const addedRootReadmeDirs = new Set();
            
            // Check for README updates
            let isRootReadmeUpdated = false;
            let isExamplesReadmeUpdated = false;
            
            // Process each changed file
            changedFiles.forEach(file => {
              if (file.filename === ROOT_README) {
                isRootReadmeUpdated = true;
              }

              if (file.filename === EXAMPLES_README) {
                isExamplesReadmeUpdated = true;
              }

              // Skip deleted files
              if (file.status === 'D') {
                return;
              }

              const dirPath = path.dirname(file.filename);

              if (isUnderExamplesDirectory(dirPath)) {
                // Add this directory and all parent example directories, but only if they're new
                let currentPath = dirPath;
                while (currentPath && currentPath !== '.' && currentPath !== EXAMPLES_ROOT) {
                  if (!directoryExistsInBase(currentPath)) {
                    addedExampleDirs.add(currentPath);
                  }
                  currentPath = path.dirname(currentPath);
                }
                return;
              }

              if (dirPath === '.' || isIgnoredRootReadmeDirectory(dirPath)) {
                return;
              }

              // Add this directory and all parent directories, but only if they're new
              let currentPath = dirPath;
              while (currentPath && currentPath !== '.') {
                if (
                  !directoryExistsInBase(currentPath) &&
                  !isIgnoredRootReadmeDirectory(currentPath)
                ) {
                  addedRootReadmeDirs.add(currentPath);
                }
                currentPath = path.dirname(currentPath);
              }
            });
            
            // Log what we found
            if (addedExampleDirs.size > 0) {
              console.log(`New example directories added: ${Array.from(addedExampleDirs).join(', ')}`);
            } else {
              console.log('No new example directories added.');
            }

            if (addedRootReadmeDirs.size > 0) {
              console.log(`New non-example directories added: ${Array.from(addedRootReadmeDirs).join(', ')}`);
            } else {
              console.log('No new non-example directories added.');
            }
            
            let hasFailure = false;

            if (addedExampleDirs.size > 0 && !isExamplesReadmeUpdated) {
              console.error(`::error::PR adds new example directories (${Array.from(addedExampleDirs).join(', ')}) but examples/README.md is not updated. Please update examples/README.md to document these example directories.`);
              hasFailure = true;
            }

            if (addedRootReadmeDirs.size > 0 && !isRootReadmeUpdated) {
              console.error(`::error::PR adds new non-example directories (${Array.from(addedRootReadmeDirs).join(', ')}) but README.md is not updated. Please update README.md to document these directories.`);
              hasFailure = true;
            }

            if (hasFailure) {
              process.exit(1);
            }
            
            console.log('Check passed!');
          }

          // Run the check
          checkReadmeUpdate();
          EOF

      - name: Run directory check script
        run: node check-readme-update.js

      - name: Debug information
        if: always()
        run: |
          echo "BASE_SHA: $BASE_SHA"
          echo "HEAD_SHA: $HEAD_SHA"
          echo "HEAD_REPO: $HEAD_REPO"
          echo "Git Branches:"
          git branch -a
